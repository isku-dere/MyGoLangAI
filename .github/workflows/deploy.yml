name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='vue-frontend/node_modules' \
            --exclude='vue-frontend/dist' \
            --exclude='.env' \
            --exclude='deploy/.env' \
            -czf /tmp/gopherai-release.tar.gz .

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          test -n "$SSH_KEY"
          test -n "$SERVER_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || 'root' }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          scp -i ~/.ssh/deploy_key -P "$SERVER_PORT" /tmp/gopherai-release.tar.gz \
            "$SERVER_USER@$SERVER_HOST:/tmp/gopherai-release-${GITHUB_SHA}.tar.gz"

      - name: Deploy on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || 'root' }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" "$SERVER_USER@$SERVER_HOST" \
            "/usr/local/bin/gopherai-deploy-archive.sh /tmp/gopherai-release-${GITHUB_SHA}.tar.gz ${GITHUB_SHA} ${GITHUB_REF_NAME}"
